<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pivot v1.0 - Sprite Creation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e5e5e5; overflow: hidden; }
        input[type="range"] { 
            -webkit-appearance: none; 
            appearance: none;
            background: #333; 
            height: 6px; 
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px; height: 16px; 
            background: #4f46e5; 
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #6366f1;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; 
            background: #4f46e5; 
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #6366f1;
        }
        .panel { background: #262626; border: 1px solid #404040; }
        .btn { background: #4f46e5; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: background 0.2s; border: none; font-size: 14px; }
        .btn:hover { background: #6366f1; }
        .btn:active { background: #4338ca; }
        .frame-item { padding: 8px 12px; border-bottom: 1px solid #404040; cursor: pointer; transition: background 0.15s; }
        .frame-item:hover { background: #383838; }
        .frame-item.active { background: #4f46e5; }
        #viewport { display: block; }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="panel w-72 flex flex-col" style="min-width: 288px;">
            <!-- Header -->
            <div class="p-4 border-b border-[#404040]">
                <h1 class="text-lg font-bold text-[#c084fc]">3D Pivot v1.0</h1>
                <p class="text-xs text-gray-400 mt-1">2D Bone Chain in 3D Viewport</p>
            </div>

            <!-- Rig Controls -->
            <div class="p-4 border-b border-[#404040]">
                <h2 class="text-sm font-semibold mb-3 text-[#a5b4fc]">Rig Controls</h2>
                
                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span>Bone: <span id="boneName">Root</span></span>
                        <span id="angleValue" class="text-[#c084fc] font-mono">0°</span>
                    </div>
                    <input type="range" id="boneSlider" min="-180" max="180" value="0" step="1">
                </div>

                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span>Origin X</span>
                        <span id="originXValue" class="text-[#c084fc] font-mono">0</span>
                    </div>
                    <input type="range" id="originXSlider" min="-200" max="200" value="0" step="1">
                </div>

                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span>Origin Y</span>
                        <span id="originYValue" class="text-[#c084fc] font-mono">0</span>
                    </div>
                    <input type="range" id="originYSlider" min="-200" max="200" value="0" step="1">
                </div>

                <div class="text-xs text-gray-400 mb-2">
                    <span>Length: <span id="boneLength">100</span>px</span><br>
                    FK Only - Forward Kinematics
                </div>

                <button class="btn w-full mb-2" onclick="addBone()">+ Add Bone</button>
                <button class="btn w-full mb-2" onclick="deleteBone()" id="deleteBoneBtn" disabled>Delete Bone</button>
                
                <div class="text-xs text-gray-500 mt-2">
                    <span>Bones: <span id="boneCount">1</span></span>
                </div>
            </div>

            <!-- Viewport Controls -->
            <div class="p-4 border-b border-[#404040]">
                <h2 class="text-sm font-semibold mb-3 text-[#a5b4fc]">Viewport</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button class="btn text-xs py-2" onclick="setView('front')">Front</button>
                    <button class="btn text-xs py-2" onclick="setView('back')">Back</button>
                    <button class="btn text-xs py-2" onclick="setView('left')">Left</button>
                    <button class="btn text-xs py-2" onclick="setView('right')">Right</button>
                    <button class="btn text-xs py-2" onclick="setView('top')">Top</button>
                    <button class="btn text-xs py-2" onclick="setView('bottom')">Bottom</button>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center">Locked Orthographic</p>
            </div>

            <!-- Frame Management -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="p-4 border-b border-[#404040] flex justify-between items-center">
                    <h2 class="text-sm font-semibold text-[#a5b4fc]">Frames</h2>
                    <button class="btn text-xs py-1 px-3" onclick="addFrame()">+ Add</button>
                </div>
                <div id="frameList" class="flex-1 overflow-y-auto">
                </div>
            </div>

            <!-- Export -->
            <div class="p-4 border-t border-[#404040]">
                <button class="btn w-full mb-2" onclick="exportPNG()">Export 64x64 PNG</button>
                <button class="btn w-full bg-gray-600 hover:bg-gray-500" onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <!-- Viewport -->
        <div class="flex-1 relative">
            <canvas id="viewport"></canvas>
            <div class="absolute top-4 left-4 bg-black/50 px-3 py-2 rounded text-xs" id="info">
                Frame: <span id="frameNum">1</span> | Bones: <span id="boneCountInfo">1</span>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // === 2D Bone System ===
        class Bone {
            constructor(name, length, parent = null) {
                this.name = name;
                this.length = length;
                this.parent = parent;
                this.localAngle = 0;
                this.worldAngle = 0;
                this.worldX = 0;
                this.worldY = 0;
                this.baseX = 0;
                this.baseY = 0;
                this.mesh = null;
            }

            updateFK(rootOffsetX = 0, rootOffsetY = 0) {
                if (this.parent) {
                    this.worldAngle = this.parent.worldAngle + this.localAngle;
                    this.baseX = this.parent.worldX;
                    this.baseY = this.parent.worldY;
                    this.worldX = this.baseX + Math.cos(this.worldAngle * Math.PI / 180) * this.length;
                    this.worldY = this.baseY + Math.sin(this.worldAngle * Math.PI / 180) * this.length;
                } else {
                    this.worldAngle = this.localAngle;
                    this.baseX = rootOffsetX;
                    this.baseY = rootOffsetY;
                    this.worldX = this.baseX + Math.cos(this.worldAngle * Math.PI / 180) * this.length;
                    this.worldY = this.baseY + Math.sin(this.worldAngle * Math.PI / 180) * this.length;
                }
            }
        }

        // === Scene Setup ===
        const canvas = document.getElementById('viewport');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const container = canvas.parentElement;
        
        const aspect = container.clientWidth / container.clientHeight;
        const viewSize = 300;
        const camera = new THREE.OrthographicCamera(
            -viewSize * aspect / 2, viewSize * aspect / 2,
            viewSize / 2, -viewSize / 2,
            1, 10000
        );

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // === Lighting ===
        const pointLight = new THREE.PointLight(0xffffff, 1.2, 2000);
        pointLight.position.set(200, 200, 300);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 1024;
        pointLight.shadow.mapSize.height = 1024;
        scene.add(pointLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
        scene.add(ambientLight);

        // === Bone Chain System ===
        const bones = [];
        let selectedBoneIndex = 0;
        let rootOffsetX = 0;
        let rootOffsetY = 0;

        function createBoneMesh(length) {
            const geometry = new THREE.BoxGeometry(8, length, 8);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4f46e5,
                metalness: 0.3,
                roughness: 0.4
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.geometry.translate(0, length / 2, 0);
            return mesh;
        }

        function initBones() {
            bones.length = 0;
            selectedBoneIndex = 0;
            
            const rootBone = new Bone('root', 100, null);
            rootBone.localAngle = 0;
            rootBone.worldX = 0;
            rootBone.worldY = 0;
            rootBone.mesh = createBoneMesh(100);
            scene.add(rootBone.mesh);
            bones.push(rootBone);
            
            updateBoneList();
        }

        function updateBoneList() {
            document.getElementById('boneCount').textContent = bones.length;
            document.getElementById('boneCountInfo').textContent = bones.length;
            updateBoneSelector();
        }

        function updateBoneSelector() {
            const boneNameEl = document.getElementById('boneName');
            const selectedBone = bones[selectedBoneIndex];
            boneNameEl.textContent = selectedBone.name;
            
            const deleteBtn = document.getElementById('deleteBoneBtn');
            deleteBtn.disabled = bones.length <= 1;
        }

        function addBone() {
            const parentBone = bones[bones.length - 1];
            const newBone = new Bone('bone_' + bones.length, 100, parentBone);
            newBone.localAngle = 0;
            newBone.mesh = createBoneMesh(100);
            scene.add(newBone.mesh);
            bones.push(newBone);
            
            selectedBoneIndex = bones.length - 1;
            updateBoneList();
            updateSliderForSelectedBone();
            updateFrameListData();
        }

        function deleteBone() {
            if (bones.length <= 1) return;
            
            const removedBone = bones.pop();
            scene.remove(removedBone.mesh);
            
            if (selectedBoneIndex >= bones.length) {
                selectedBoneIndex = bones.length - 1;
            }
            updateBoneList();
            updateSliderForSelectedBone();
            updateFrameListData();
        }

        // === Create Root Bone ===
        initBones();

        const jointGeometry = new THREE.SphereGeometry(10, 16, 16);
        const jointMaterial = new THREE.MeshStandardMaterial({ color: 0xc084fc });
        const jointMesh = new THREE.Mesh(jointGeometry, jointMaterial);
        jointMesh.castShadow = true;
        jointMesh.position.set(0, 0, 0);
        scene.add(jointMesh);

        const endJointGeometry = new THREE.SphereGeometry(8, 12, 12);
        const endJointMaterial = new THREE.MeshStandardMaterial({ color: 0xf472b6 });
        const endJointMesh = new THREE.Mesh(endJointGeometry, endJointMaterial);
        endJointMesh.castShadow = true;
        scene.add(endJointMesh);

        const gridHelper = new THREE.GridHelper(800, 20, 0x404040, 0x303030);
        gridHelper.rotation.x = Math.PI / 2;
        gridHelper.position.z = -50;
        scene.add(gridHelper);

        // === Camera Views ===
        const views = {
            front: () => { camera.position.set(0, 0, 500); camera.lookAt(0, 0, 0); },
            back: () => { camera.position.set(0, 0, -500); camera.lookAt(0, 0, 0); },
            left: () => { camera.position.set(-500, 0, 0); camera.lookAt(0, 0, 0); },
            right: () => { camera.position.set(500, 0, 0); camera.lookAt(0, 0, 0); },
            top: () => { camera.position.set(0, 500, 0); camera.lookAt(0, 0, 0); camera.up.set(0, 0, -1); },
            bottom: () => { camera.position.set(0, -500, 0); camera.lookAt(0, 0, 0); camera.up.set(0, 0, 1); }
        };

        views.front();
        camera.up.set(0, 1, 0);

        function setView(dir) {
            views[dir]();
            camera.up.set(0, 1, 0);
            if (dir === 'top') camera.up.set(0, 0, -1);
            if (dir === 'bottom') camera.up.set(0, 0, 1);
        }

        // === Frame System ===
        let frames = [{ id: 1, bones: [{ name: 'root', angle: 0 }], originX: 0, originY: 0 }];
        let currentFrame = 0;

        function serializeBones() {
            return bones.map(bone => ({
                name: bone.name,
                angle: bone.localAngle,
                length: bone.length
            }));
        }

        function deserializeBones(boneData) {
            bones.length = 0;
            boneData.forEach((data, i) => {
                const parent = i === 0 ? null : bones[i - 1];
                const bone = new Bone(data.name || ('bone_' + i), data.length || 100, parent);
                bone.localAngle = data.angle || 0;
                bone.mesh = createBoneMesh(bone.length);
                scene.add(bone.mesh);
                bones.push(bone);
            });
            selectedBoneIndex = 0;
            updateBoneList();
        }

        function updateFrameList() {
            const list = document.getElementById('frameList');
            list.innerHTML = frames.map((f, i) => 
                `<div class="frame-item ${i === currentFrame ? 'active' : ''}" onclick="selectFrame(${i})">
                    Frame ${i + 1}
                    <button class="delete-frame-btn ml-2 text-red-400 hover:text-red-200" onclick="deleteFrame(${i}); event.stopPropagation();">×</button>
                </div>`
            ).join('');
        }

        function updateFrameListData() {
            if (frames[currentFrame]) {
                frames[currentFrame].bones = serializeBones();
                frames[currentFrame].originX = rootOffsetX;
                frames[currentFrame].originY = rootOffsetY;
            }
        }

        function selectFrame(idx) {
            currentFrame = idx;
            const frame = frames[idx];
            
            const boneData = frame.bones || [{ name: 'root', angle: 0 }];
            deserializeBones(boneData);
            
            rootOffsetX = frame.originX || 0;
            rootOffsetY = frame.originY || 0;
            document.getElementById('originXSlider').value = rootOffsetX;
            document.getElementById('originYSlider').value = rootOffsetY;
            document.getElementById('originXValue').textContent = rootOffsetX;
            document.getElementById('originYValue').textContent = rootOffsetY;
            
            selectedBoneIndex = 0;
            updateSliderForSelectedBone();
            document.getElementById('frameNum').textContent = idx + 1;
            updateFrameList();
        }

        function addFrame() {
            const newIdx = frames.length;
            updateFrameListData();
            frames.push({ 
                id: newIdx + 1, 
                bones: serializeBones(),
                originX: rootOffsetX,
                originY: rootOffsetY
            });
            currentFrame = newIdx;
            document.getElementById('frameNum').textContent = newIdx + 1;
            updateFrameList();
        }

        function deleteFrame(index) {
            if (frames.length <= 1) {
                return;
            }
            frames.splice(index, 1);
            if (currentFrame >= frames.length) {
                currentFrame = frames.length - 1;
            }
            selectFrame(currentFrame);
        }

        function clearAll() {
            bones.forEach(b => scene.remove(b.mesh));
            initBones();
            rootOffsetX = 0;
            rootOffsetY = 0;
            document.getElementById('originXSlider').value = 0;
            document.getElementById('originYSlider').value = 0;
            document.getElementById('originXValue').textContent = '0';
            document.getElementById('originYValue').textContent = '0';
            frames = [{ id: 1, bones: [{ name: 'root', angle: 0 }], originX: 0, originY: 0 }];
            currentFrame = 0;
            selectedBoneIndex = 0;
            updateSliderForSelectedBone();
            document.getElementById('frameNum').textContent = '1';
            updateFrameList();
        }

        function updateSliderForSelectedBone() {
            const bone = bones[selectedBoneIndex];
            if (bone) {
                document.getElementById('boneSlider').value = bone.localAngle;
                document.getElementById('angleValue').textContent = bone.localAngle + '°';
            }
        }

        // === Bone Rotation Handler ===
        const slider = document.getElementById('boneSlider');
        slider.addEventListener('input', (e) => {
            const angle = parseInt(e.target.value);
            const bone = bones[selectedBoneIndex];
            bone.localAngle = angle;
            document.getElementById('angleValue').textContent = angle + '°';
            if (frames[currentFrame]) {
                frames[currentFrame].bones[selectedBoneIndex].angle = angle;
            }
        });

        // === Origin Position Handlers ===
        const originXSlider = document.getElementById('originXSlider');
        originXSlider.addEventListener('input', (e) => {
            rootOffsetX = parseInt(e.target.value);
            document.getElementById('originXValue').textContent = rootOffsetX;
            if (frames[currentFrame]) {
                frames[currentFrame].originX = rootOffsetX;
            }
        });

        const originYSlider = document.getElementById('originYSlider');
        originYSlider.addEventListener('input', (e) => {
            rootOffsetY = parseInt(e.target.value);
            document.getElementById('originYValue').textContent = rootOffsetY;
            if (frames[currentFrame]) {
                frames[currentFrame].originY = rootOffsetY;
            }
        });

        // === Animation Loop ===
        function animate() {
            requestAnimationFrame(animate);

            bones.forEach(bone => bone.updateFK(rootOffsetX, rootOffsetY));

            for (let i = 0; i < bones.length; i++) {
                const bone = bones[i];
                const angleRad = bone.worldAngle * Math.PI / 180;
                
                bone.mesh.position.set(bone.baseX, bone.baseY, 0);
                bone.mesh.rotation.z = angleRad;
            }

            endJointMesh.position.set(
                bones[bones.length - 1].worldX,
                bones[bones.length - 1].worldY,
                0
            );

            renderer.render(scene, camera);
        }

        // === Export PNG ===
        function exportPNG() {
            const exportRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
            exportRenderer.setSize(64, 64);
            
            const exportScene = new THREE.Scene();
            exportScene.background = null;
            
            const exportPointLight = pointLight.clone();
            const exportAmbientLight = ambientLight.clone();
            exportScene.add(exportPointLight);
            exportScene.add(exportAmbientLight);
            
            bones.forEach(bone => {
                const exportBoneMesh = bone.mesh.clone();
                exportScene.add(exportBoneMesh);
            });
            
            const exportJointMesh = jointMesh.clone();
            const exportEndJointMesh = endJointMesh.clone();
            exportScene.add(exportJointMesh);
            exportScene.add(exportEndJointMesh);
            
            const exportCamera = new THREE.OrthographicCamera(
                -viewSize * aspect / 2, viewSize * aspect / 2,
                viewSize / 2, -viewSize / 2,
                1, 10000
            );
            exportCamera.position.copy(camera.position);
            exportCamera.quaternion.copy(camera.quaternion);
            exportCamera.up.copy(camera.up);
            
            exportRenderer.render(exportScene, exportCamera);
            
            exportRenderer.domElement.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'frame_' + (currentFrame + 1) + '_64x64.png';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        window.setView = setView;
        window.addFrame = addFrame;
        window.deleteFrame = deleteFrame;
        window.clearAll = clearAll;
        window.selectFrame = selectFrame;
        window.exportPNG = exportPNG;
        window.addBone = addBone;
        window.deleteBone = deleteBone;

        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.left = -viewSize * w / h / 2;
            camera.right = viewSize * w / h / 2;
            camera.top = viewSize / 2;
            camera.bottom = -viewSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        updateFrameList();
        animate();
    </script>
</body>
</html>
