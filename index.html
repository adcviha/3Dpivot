<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pivot 3D — v1.0</title>
<style>
:root {
  --bg: #0c0c0e;
  --panel: #14141a;
  --panel-2: #1c1c24;
  --border: #2a2a34;
  --border-2: #3a3a48;
  --text: #d8d8de;
  --text-dim: #767680;
  --accent: #ff7a1a;
  --accent-dim: #b04e0a;
  --accent-cool: #4a8cff;
  --ghost-prev: #ff5566;
  --ghost-next: #66bbff;
  --danger: #d83a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Consolas, monospace;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
}
#topbar {
  display: flex; align-items: center;
  height: 40px; padding: 0 12px; gap: 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.title { color: var(--accent); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; font-size: 11px; }
.title .ver { color: var(--text-dim); margin-left: 6px; }
.sep { width: 1px; height: 20px; background: var(--border); }
button, .btn {
  background: var(--panel-2); color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 10px;
  font-family: inherit; font-size: 10px;
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em;
  transition: color .1s, border-color .1s, background .1s;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button:active { background: var(--accent); color: var(--bg); }
button.danger { color: var(--text-dim); }
button.danger:hover { border-color: var(--danger); color: var(--danger); }
button.toggle.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }
button.icon { padding: 4px 8px; font-size: 11px; }

input[type="text"], input[type="number"], select {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border);
  font-family: inherit; font-size: 11px;
  padding: 4px 6px; width: 100%; outline: none;
}
input[type="number"] { width: 50px; }
input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
input[type="color"] { background: var(--bg); border: 1px solid var(--border); width: 100%; height: 26px; cursor: pointer; padding: 2px; }
input[type="range"] { width: 100%; -webkit-appearance: none; appearance: none; background: transparent; height: 14px; cursor: pointer; }
input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--border-2); }
input[type="range"]::-moz-range-track { height: 2px; background: var(--border-2); }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 14px; background: var(--accent); border-radius: 0; margin-top: -6px; cursor: pointer; }
input[type="range"]::-moz-range-thumb { width: 10px; height: 14px; background: var(--accent); border-radius: 0; border: none; cursor: pointer; }

#main { flex: 1; display: flex; min-height: 0; }
.panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.panel.right { border-right: none; border-left: 1px solid var(--border); }
.panel-header { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#tree-panel { width: 220px; }
#props-panel { width: 280px; }
#viewport-wrap { flex: 1; position: relative; min-width: 0; background: #050507; }
canvas { display: block; }
canvas#viewport { width: 100%; height: 100%; }

#tree { flex: 1; overflow-y: auto; padding: 4px 0; }
#tree::-webkit-scrollbar, #props::-webkit-scrollbar, #frame-strip::-webkit-scrollbar { width: 8px; height: 8px; }
#tree::-webkit-scrollbar-track, #props::-webkit-scrollbar-track, #frame-strip::-webkit-scrollbar-track { background: var(--panel); }
#tree::-webkit-scrollbar-thumb, #props::-webkit-scrollbar-thumb, #frame-strip::-webkit-scrollbar-thumb { background: var(--border); }

.tree-item { padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; border-left: 2px solid transparent; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-item:hover { background: var(--panel-2); }
.tree-item.selected { background: var(--panel-2); border-left-color: var(--accent); color: var(--accent); }
.tree-item .icon { width: 10px; text-align: center; color: var(--text-dim); font-size: 9px; }
.tree-item.selected .icon { color: var(--accent); }
.tree-bone { font-weight: 600; }
.tree-prim { color: var(--text-dim); }
.tree-prim.selected { color: var(--accent); }
.swatch { display: inline-block; width: 9px; height: 9px; border: 1px solid #000; flex-shrink: 0; }

#tree-actions { padding: 8px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); flex-shrink: 0; }
#tree-actions .row { display: flex; gap: 6px; }
#tree-actions .row select { flex: 1; }

.prop-row { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.prop-row label { display: block; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
.prop-row .val { color: var(--accent); font-size: 10px; float: right; font-weight: 700; }
#props { flex: 1; overflow-y: auto; }

.empty-state { padding: 30px 16px; color: var(--text-dim); font-style: italic; text-align: center; font-size: 10px; line-height: 1.6; }

#viewport-overlay {
  position: absolute; top: 10px; left: 12px;
  font-size: 9px; color: var(--text-dim);
  pointer-events: none; letter-spacing: 0.15em; text-transform: uppercase;
  text-shadow: 0 0 4px #000;
}
#viewport-overlay .accent { color: var(--accent); }
#viewport-overlay .key { color: var(--text); padding: 0 4px; border: 1px solid var(--border-2); margin: 0 2px; }

#preview-wrap {
  position: absolute; top: 10px; right: 10px;
  border: 1px solid var(--border-2);
  background: #000;
  display: flex; flex-direction: column;
  pointer-events: none;
}
#preview-wrap .preview-label {
  font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); background: var(--panel);
  padding: 3px 6px; border-bottom: 1px solid var(--border-2);
  text-align: center;
}
canvas#preview {
  width: 192px; height: 192px;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  display: block;
}

.view-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.view-controls label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; }
.view-controls input[type="range"] { width: 120px; }
.view-controls .val { font-size: 10px; color: var(--accent); width: 38px; text-align: right; font-weight: 700; }

/* TIMELINE */
#timeline {
  height: 100px; flex-shrink: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
}
#timeline-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px;
  border-right: 1px solid var(--border);
}
#timeline-controls .group { display: flex; align-items: center; gap: 6px; }
#timeline-controls label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; }
.frame-counter { font-size: 11px; color: var(--accent); font-weight: 700; min-width: 60px; }
#frame-strip-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 12px; }
#frame-strip { display: flex; gap: 6px; height: 100%; }
.frame-cell {
  width: 64px; min-width: 64px; height: 64px;
  border: 1px solid var(--border-2);
  background: var(--panel-2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: border-color .1s, background .1s;
}
.frame-cell:hover { border-color: var(--accent-dim); }
.frame-cell.active {
  border-color: var(--accent); background: rgba(255,122,26,0.08);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.frame-cell .num { font-size: 14px; font-weight: 700; color: var(--text-dim); }
.frame-cell.active .num { color: var(--accent); }
.frame-cell .yaw-tag { position: absolute; bottom: 3px; left: 3px; right: 3px; font-size: 8px; color: var(--text-dim); text-align: center; letter-spacing: 0.1em; }
.frame-add {
  width: 36px; min-width: 36px; height: 64px;
  border: 1px dashed var(--border-2); background: transparent;
  color: var(--text-dim); cursor: pointer;
  font-size: 16px;
}
.frame-add:hover { border-color: var(--accent); color: var(--accent); }
#timeline-actions { display: flex; align-items: center; gap: 6px; padding: 0 14px; border-left: 1px solid var(--border); }
.onion-group { display: flex; gap: 2px; }
.onion-btn {
  padding: 4px 8px;
  border-right: none;
}
.onion-btn:last-child { border-right: 1px solid var(--border); }
</style>
</head>
<body>
<div id="topbar">
  <div class="title">PIVOT·3D <span class="ver">v1.0</span></div>
  <div class="sep"></div>
  <button id="btn-new">New</button>
  <button id="btn-save-char">Save Char</button>
  <button id="btn-save-anim">Save Anim</button>
  <button id="btn-load">Load</button>
  <input type="file" id="file-input" accept=".json" style="display:none">
  <div class="view-controls">
    <label>Yaw</label>
    <input type="range" id="yaw-slider" min="-180" max="180" value="0" step="1">
    <span class="val" id="yaw-val">0°</span>
    <button id="btn-yaw-reset">0</button>
  </div>
</div>
<div id="main">
  <div class="panel" id="tree-panel">
    <div class="panel-header">Hierarchy</div>
    <div id="tree"></div>
    <div id="tree-actions">
      <button id="btn-add-bone" style="display:none">+ Bone</button>
      <div class="row">
        <select id="prim-type">
          <option value="box">Box</option>
          <option value="sphere">Sphere</option>
          <option value="cylinder">Cylinder</option>
          <option value="capsule">Capsule</option>
        </select>
        <button id="btn-add-prim" style="display:none">+ Prim</button>
      </div>
    </div>
  </div>
  <div id="viewport-wrap">
    <canvas id="viewport"></canvas>
    <div id="viewport-overlay">
      <span class="accent">drag</span> tip · <span class="accent">shift+drag</span> resizes · <span class="accent">drag origin</span> ring · <span class="key">←</span><span class="key">→</span> frame · <span class="key">space</span> play
    </div>
    <div id="preview-wrap">
      <div class="preview-label">64 × 64 PREVIEW</div>
      <canvas id="preview" width="64" height="64"></canvas>
    </div>
  </div>
  <div class="panel right" id="props-panel">
    <div class="panel-header">Properties</div>
    <div id="props"></div>
  </div>
</div>

<div id="timeline">
  <div id="timeline-controls">
    <div class="group">
      <button id="btn-play" class="icon">▶</button>
      <span class="frame-counter" id="frame-counter">1 / 1</span>
    </div>
    <div class="group">
      <label>FPS</label>
      <input type="number" id="fps-input" min="1" max="60" value="8">
    </div>
  </div>
  <div id="frame-strip-wrap">
    <div id="frame-strip"></div>
  </div>
  <div id="timeline-actions">
    <div class="group">
      <label>Onion</label>
      <div class="onion-group">
        <button class="onion-btn toggle" data-onion="0">0</button>
        <button class="onion-btn toggle on" data-onion="1">1</button>
        <button class="onion-btn toggle" data-onion="2">2</button>
      </div>
    </div>
    <div class="sep"></div>
    <button id="btn-frame-dup">Duplicate</button>
    <button id="btn-frame-del" class="danger">Delete</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
// DATA MODEL
// ============================================================
let nextId = 1;
function newId(prefix) { return prefix + '_' + (nextId++); }

let character = {
  primitives: [
    { id: 'prim_1', type: 'box',     size: { l: 0.6, w: 0.4, h: 0.4 }, color: '#aa7755', x: -0.3, y: 0, zOffset: 0 },
    { id: 'prim_2', type: 'sphere',  size: { r: 0.42 },                   color: '#ddccaa', x: 0, y: 1.0, zOffset: 0 },
    { id: 'prim_3', type: 'capsule', size: { r: 0.13, l: 0.7 },           color: '#a36a4a', x: 0.8, y: 0.3, zOffset: 0.18 },
    { id: 'prim_4', type: 'capsule', size: { r: 0.13, l: 0.7 },           color: '#a36a4a', x: -0.8, y: 0.3, zOffset: -0.18 },
    { id: 'prim_5', type: 'capsule', size: { r: 0.16, l: 0.85 },          color: '#5a4a78', x: 0.4, y: -0.8, zOffset: 0.05 },
    { id: 'prim_6', type: 'capsule', size: { r: 0.16, l: 0.85 },          color: '#5a4a78', x: -0.4, y: -0.8, zOffset: -0.05 }
  ]
};
let animation = { fps: 8, frames: [{ yaw: 0 }] };
let currentFrameIdx = 0;
let selection = { type: null, id: null };
let onionLevel = 1;
let playing = false;
let playAccum = 0;
let lastTickTime = 0;

function curFrame() { return animation.frames[currentFrameIdx]; }

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;

const previewCanvas = document.getElementById('preview');
const previewRenderer = new THREE.WebGLRenderer({ canvas: previewCanvas, antialias: false, alpha: false });
previewRenderer.setPixelRatio(1); // strict 64x64
previewRenderer.shadowMap.enabled = true;
    previewRenderer.shadowMap.type = THREE.BasicShadowMap;
    previewRenderer.shadowMap.autoUpdate = false;
previewRenderer.setSize(64, 64, false);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050507);

let camera, previewCamera;
function makeCameras() {
  const w = canvas.clientWidth || 1, h = canvas.clientHeight || 1;
  const aspect = w / h;
  const size = 3.2;
  camera = new THREE.OrthographicCamera(-size * aspect, size * aspect, size, -size, 0.01, 200);
  camera.position.set(0, 0, 30);
  camera.lookAt(0, 0, 0);
  // square preview camera (64x64 = aspect 1)
  const psz = 2.6;
  previewCamera = new THREE.OrthographicCamera(-psz, psz, psz, -psz, 0.01, 200);
  previewCamera.position.set(0, 0, 30);
  previewCamera.lookAt(0, 0, 0);
}
function resize() {
  const w = canvas.clientWidth || 1, h = canvas.clientHeight || 1;
  renderer.setSize(w, h, false);
  if (camera) {
    const aspect = w / h;
    const size = 3.2;
    camera.left = -size * aspect; camera.right = size * aspect;
    camera.top = size; camera.bottom = -size;
    camera.updateProjectionMatrix();
  }
}
makeCameras();
resize();
window.addEventListener('resize', resize);

// Ambient (world)
scene.add(new THREE.AmbientLight(0xffffff, 0.06));

// Lights live in their own yaw group so they rotate with the rig view.
// Net effect: from any yaw, the character is lit from the same relative angle.
const lightsYawGroup = new THREE.Group();
scene.add(lightsYawGroup);

const keyLight = new THREE.PointLight(0xffe4c0, 1.9, 60, 1.2);
    keyLight.position.set(3.5, 4.5, 5.5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(8192, 8192);
    keyLight.shadow.bias = 0;
    keyLight.shadow.normalBias = 0;
lightsYawGroup.add(keyLight);

const fillLight = new THREE.PointLight(0x3a5078, 0.18, 40, 1);
fillLight.position.set(-4, -2, -5);
lightsYawGroup.add(fillLight);

// --- frame group factory: rotation.y + position lets a single Object3D both
//     orbit by yaw and translate to the frame's root position.
function makeFrameGroup() {
  const g = new THREE.Group();
  scene.add(g);
  return g;
}
const currentRigGroup = makeFrameGroup();   // primitives for current frame (lit, shadowed)
const currentOverlayGroup = makeFrameGroup(); // editor handles
const ghostGroups = [makeFrameGroup(), makeFrameGroup()]; // up to 2 ghosts (prev, next)

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function makeCapsuleGeometry(radius, length) {
  const seg = 8;
  const pts = [];
  for (let i = 0; i <= seg; i++) {
    const a = -Math.PI / 2 + (i / seg) * Math.PI / 2;
    pts.push(new THREE.Vector2(Math.cos(a) * radius, Math.sin(a) * radius - length / 2));
  }
  for (let i = 0; i <= seg; i++) {
    const a = (i / seg) * Math.PI / 2;
    pts.push(new THREE.Vector2(Math.cos(a) * radius, Math.sin(a) * radius + length / 2));
  }
  return new THREE.LatheGeometry(pts, 12);
}

function buildPrimMesh(prim, opts) {
  opts = opts || {};
  let geo;
  switch (prim.type) {
    case 'box':      geo = new THREE.BoxGeometry(prim.size.l || 1, prim.size.w || 1, prim.size.h || 1); break;
    case 'sphere':   geo = new THREE.SphereGeometry(prim.size.r || 0.5, 12, 8); break;
    case 'cylinder': geo = new THREE.CylinderGeometry(prim.size.r || 0.3, prim.size.r || 0.3, prim.size.l || 1, 12); geo.rotateZ(Math.PI / 2); break;
    case 'capsule':  geo = makeCapsuleGeometry(prim.size.r || 0.3, prim.size.l || 1); geo.rotateZ(Math.PI / 2); break;
    default:         geo = new THREE.BoxGeometry(1, 1, 1);
  }
  let mat;
  if (opts.ghost) {
    const tint = new THREE.Color(opts.ghostColor || '#ff5566');
    mat = new THREE.MeshBasicMaterial({ color: tint, transparent: true, opacity: opts.ghostOpacity || 0.22, depthWrite: false });
  } else {
    mat = new THREE.MeshLambertMaterial({ color: prim.color || '#ffffff', flatShading: true });
  }
  const mesh = new THREE.Mesh(geo, mat);
  if (!opts.ghost) {
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = { kind: 'primitive', id: prim.id };
  }
  return mesh;
}

// ============================================================
// SCENE REBUILDS
// ============================================================
function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  }
}

function buildPrimitivesInto(group, frameAngles, opts) {
  opts = opts || {};
  for (const prim of character.primitives) {
    const mesh = buildPrimMesh(prim, opts);
    mesh.position.set(prim.x || 0, prim.y || 0, prim.zOffset || 0);
    group.add(mesh);
  }
}

function rebuildAll() {
  clearGroup(currentRigGroup);
  clearGroup(currentRigGroup);
  ghostGroups.forEach(clearGroup);

  buildPrimitivesInto(currentRigGroup, curFrame());

  // Ghosts: prev frame, then next frame
  const ghostFrames = [];
  if (onionLevel >= 1 && currentFrameIdx > 0) {
    ghostFrames.push({ frame: animation.frames[currentFrameIdx - 1], color: '#ff5566', opacity: 0.22 });
  }
  if (onionLevel >= 2 && currentFrameIdx < animation.frames.length - 1) {
    ghostFrames.push({ frame: animation.frames[currentFrameIdx + 1], color: '#66bbff', opacity: 0.22 });
  }
  ghostFrames.forEach((gf, i) => {
    if (i >= ghostGroups.length) return;
    buildPrimitivesInto(ghostGroups[i], gf.frame, { ghost: true, ghostColor: gf.color, ghostOpacity: gf.opacity });
    ghostGroups[i].userData.frame = gf.frame;
  });
  for (let i = ghostFrames.length; i < ghostGroups.length; i++) ghostGroups[i].userData.frame = null;
}

function updateGroupTransforms() {
  const f = curFrame();
  // Lights rotate with current view so lighting "follows" the camera.
  lightsYawGroup.rotation.y = f.yaw || 0;

  currentRigGroup.rotation.y = f.yaw || 0;
  currentRigGroup.position.set(f.rootX || 0, f.rootY || 0, 0);

  ghostGroups.forEach(g => {
    const gf = g.userData.frame;
    if (!gf) { g.visible = false; return; }
    g.visible = true;
    g.rotation.y = gf.yaw || 0;
    g.position.set(gf.rootX || 0, gf.rootY || 0, 0);
  });
}

// ============================================================
// MAIN LOOP
// ============================================================
function tick(now) {
  if (!lastTickTime) lastTickTime = now || performance.now();
  const dt = (now || performance.now()) - lastTickTime;
  lastTickTime = now || performance.now();

  if (playing && animation.frames.length > 1) {
    playAccum += dt;
    const frameDur = 1000 / Math.max(1, animation.fps);
    while (playAccum >= frameDur) {
      currentFrameIdx = (currentFrameIdx + 1) % animation.frames.length;
      playAccum -= frameDur;
      onFrameChange(false);
    }
  }

  updateGroupTransforms();
  renderer.render(scene, camera);
  previewRenderer.render(scene, previewCamera);
  requestAnimationFrame(tick);
}
rebuildAll();
requestAnimationFrame(tick);

// ============================================================
// INTERACTION: PICKING + DRAG
// ============================================================
const raycaster = new THREE.Raycaster();
let dragging = null;

function mouseToNDC(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: ((e.clientX - rect.left) / rect.width) * 2 - 1,
    y: -((e.clientY - rect.top) / rect.height) * 2 + 1
  };
}

function pickAt(e) {
  const ndc = mouseToNDC(e);
  raycaster.setFromCamera(ndc, camera);
  
  }
  const rigHits = raycaster.intersectObjects(currentRigGroup.children, false);
  for (const h of rigHits) {
    if (h.object.userData && h.object.userData.kind === 'primitive') return { type: 'primitive', id: h.object.userData.id };
  }
  return null;
}

// Cursor → world XY plane (z=0). Used for translating the rig origin.
function mouseToWorldXY(e) {
  const ndc = mouseToNDC(e);
  raycaster.setFromCamera(ndc, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  const hit = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(plane, hit)) return null;
  return { x: hit.x, y: hit.y };
}

// Cursor → rig-local XY (the yawed plane that passes through the rig origin).
function mouseToRigLocal(e) {
  const f = curFrame();
  const ndc = mouseToNDC(e);
  raycaster.setFromCamera(ndc, camera);
  const yaw = f.yaw || 0;
  const cosY = Math.cos(yaw), sinY = Math.sin(yaw);
  const planeNormal = new THREE.Vector3(sinY, 0, cosY);
  const rigOrigin = new THREE.Vector3(f.rootX || 0, f.rootY || 0, 0);
  const plane = new THREE.Plane(planeNormal.clone(), -planeNormal.dot(rigOrigin));
  const hit = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(plane, hit)) return null;
  const v = hit.clone().sub(rigOrigin);
  return { x: v.x * cosY - v.z * sinY, y: v.y };
}

// ============================================================
// UI: TIMELINE / FRAMES
// ============================================================
function renderFrameStrip() {
  const strip = document.getElementById('frame-strip');
  strip.innerHTML = '';
  animation.frames.forEach((f, i) => {
    const cell = document.createElement('div');
    cell.className = 'frame-cell' + (i === currentFrameIdx ? ' active' : '');
    const yawDeg = Math.round((f.yaw || 0) * 180 / Math.PI);
    cell.innerHTML = '<div class="num">' + (i + 1) + '</div>' + (yawDeg !== 0 ? '<div class="yaw-tag">y' + yawDeg + '°</div>' : '');
    cell.addEventListener('click', () => { gotoFrame(i); });
    strip.appendChild(cell);
  });
  const add = document.createElement('div');
  add.className = 'frame-add';
  add.textContent = '+';
  add.title = 'Add frame (duplicate current)';
  add.addEventListener('click', addFrame);
  strip.appendChild(add);

  document.getElementById('frame-counter').textContent = (currentFrameIdx + 1) + ' / ' + animation.frames.length;

  // scroll active into view
  setTimeout(() => {
    const active = strip.querySelector('.frame-cell.active');
    if (active && active.scrollIntoView) active.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }, 0);
}

function gotoFrame(i) {
  if (i < 0 || i >= animation.frames.length) return;
  currentFrameIdx = i;
  onFrameChange(true);
}

function onFrameChange(updateUI) {
  // Sync yaw slider to the new frame
  const yawDeg = Math.round((curFrame().yaw || 0) * 180 / Math.PI);
  document.getElementById('yaw-slider').value = yawDeg;
  document.getElementById('yaw-val').textContent = yawDeg + '°';
  rebuildAll();
  if (updateUI !== false) { renderFrameStrip(); renderProps(); }
}

function addFrame() {
  const dup = JSON.parse(JSON.stringify(curFrame()));
  animation.frames.splice(currentFrameIdx + 1, 0, dup);
  currentFrameIdx += 1;
  onFrameChange(true);
}
function duplicateFrame() { addFrame(); }
function deleteFrame() {
  if (animation.frames.length <= 1) { alert('Animation must have at least one frame.'); return; }
  animation.frames.splice(currentFrameIdx, 1);
  if (currentFrameIdx >= animation.frames.length) currentFrameIdx = animation.frames.length - 1;
  onFrameChange(true);
}

document.getElementById('btn-frame-del').addEventListener('click', deleteFrame);

document.getElementById('btn-add-bone').addEventListener('click', () => {
  let parentId;
  if (selection.type === 'bone') parentId = selection.id;
  else if (selection.type === 'primitive') {
    const p = character.primitives.find(x => x.id === selection.id);
    parentId = p ? p.boneId : (character.bones[0] && character.bones[0].id);
  } else parentId = character.bones[0] && character.bones[0].id;
  if (!parentId) return;
  const id = newId('bone');
  character.bones.push({ id: id, parentId: parentId, length: 0.8, name: 'bone' });
  // Initialize this bone's angle to 0 in every frame.
  for (const f of animation.frames) f.angles[id] = 0;
  selection = { type: 'bone', id: id };
  rebuildAll(); renderTree(); renderProps();
});

function downloadJSON(obj, name) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

document.getElementById('btn-save-char').addEventListener('click', () => {
  const data = { format: 'pivot3d-character', version: '1.0', character: character };
  const name = (character.bones.find(b => b.parentId === null) || {}).name || 'character';
  downloadJSON(data, name.replace(/\s+/g, '_') + '.char.json');
});
document.getElementById('btn-save-anim').addEventListener('click', () => {
  const data = { format: 'pivot3d-animation', version: '1.0', character: character, animation: animation };
  const name = (character.bones.find(b => b.parentId === null) || {}).name || 'character';
  downloadJSON(data, name.replace(/\s+/g, '_') + '.anim.json');
});
// btn-load handler removed
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.character || !data.character.bones) throw new Error('Not a valid Pivot 3D file');

      // v0.5 compatibility: a `pose` object lives on character. Convert to a 1-frame animation.
      if (data.character.pose && !data.animation) {
        character = { bones: data.character.bones, primitives: data.character.primitives };
        animation = { fps: 8, frames: [{ angles: data.character.pose, rootX: 0, rootY: 0, yaw: 0 }] };
      } else if (data.animation) {
        // Animation file
        character = data.character;
        animation = data.animation;
        // Defensive: ensure frames have all expected fields
        animation.frames = animation.frames.map(f => Object.assign({ angles: {}, rootX: 0, rootY: 0, yaw: 0 }, f));
        animation.fps = animation.fps || 8;
      } else {
        // Character-only file — keep current animation (and add zeros for any new bones)
        character = data.character;
        for (const f of animation.frames) {
          for (const b of character.bones) if (f.angles[b.id] == null) f.angles[b.id] = 0;
        }
      }

      // Bump nextId past anything in the file
      let max = 0;
      const scan = (id) => { const m = String(id).match(/_(\d+)$/); if (m) max = Math.max(max, parseInt(m[1])); };
      character.bones.forEach(b => scan(b.id));
      character.primitives.forEach(p => scan(p.id));
      nextId = max + 1;

      currentFrameIdx = 0;
      selection = { type: null, id: null };
      document.getElementById('fps-input').value = animation.fps;
      rebuildAll(); renderTree(); renderProps(); renderFrameStrip();
      onFrameChange(true);
    } catch (err) {
      alert('Could not load: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('yaw-slider').addEventListener('input', (e) => {
  const deg = parseFloat(e.target.value);
  curFrame().yaw = deg * Math.PI / 180;
  document.getElementById('yaw-val').textContent = deg + '°';
  // Frame strip cell may show the yaw tag
  renderFrameStrip();
});
document.getElementById('btn-yaw-reset').addEventListener('click', () => {
  curFrame().yaw = 0;
  document.getElementById('yaw-slider').value = 0;
  document.getElementById('yaw-val').textContent = '0°';
  renderFrameStrip();
});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); gotoFrame((currentFrameIdx - 1 + animation.frames.length) % animation.frames.length); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); gotoFrame((currentFrameIdx + 1) % animation.frames.length); }
  else if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  else if (e.key === 'd' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); duplicateFrame(); }
});

// ============================================================
// INITIAL RENDER
// ============================================================
renderTree();
renderProps();
renderFrameStrip();
onFrameChange(true);
